media:
  input: assets/images
  output: /assets/images

content:

  - name: settings
    label: Site Settings
    path: content/settings.json
    type: file
    fields:
      - { name: exam_date,        label: "Next CA Exam Date (YYYY-MM-DD)", type: string }
      - { name: stats_students,   label: "Students Enrolled",              type: number }
      - { name: stats_programs,   label: "Total Programs",                 type: number }
      - { name: stats_tutors,     label: "Expert Tutors",                  type: number }
      - { name: stats_winners,    label: "Rank Winners",                   type: number }
      - { name: stats_questions,  label: "Question Bank Items",            type: number }
      - { name: phone_primary,    label: "Primary Phone",                  type: string }
      - { name: phone_secondary,  label: "Secondary Phone",                type: string }
      - { name: email,            label: "Email Address",                  type: string }
      - { name: address,          label: "Full Address",                   type: text   }
      - { name: hours,            label: "Business Hours",                 type: string }
      - { name: whatsapp_number,  label: "WhatsApp Number (country code, no +)", type: string }

  - name: courses
    label: Courses & Programs
    path: content/courses
    type: collection
    view:
      fields: [title, category, price]
    fields:
      - { name: title,       label: "Course Title",               type: string  }
      - name: category
        label: Category
        type: select
        options:
          values:
            - { label: "CA Foundation",   value: ca        }
            - { label: "CA Intermediate", value: inter     }
            - { label: "CA Final",        value: final     }
            - { label: "Computing",       value: computing }
            - { label: "Professional",    value: pro       }
            - { label: "Custom Coaching", value: custom    }
      - { name: description, label: "Short Description",          type: text    }
      - { name: price,       label: "Price in ₹ (0 = Enquire)",  type: number  }
      - { name: duration,    label: "Duration (e.g. 6 Months)",  type: string  }
      - { name: hours,       label: "Total Hours",                type: number  }
      - { name: lessons,     label: "Number of Lessons",          type: number  }
      - name: level
        label: Level
        type: select
        options:
          values:
            - { label: Beginner,     value: beginner     }
            - { label: Intermediate, value: intermediate }
            - { label: Advanced,     value: advanced     }
      - { name: featured,    label: "Featured on Homepage",       type: boolean }
      - { name: image,       label: "Course Cover Image",         type: image   }

  - name: store
    label: Store Products
    path: content/store
    type: collection
    view:
      fields: [name, category, price]
    fields:
      - { name: name,        label: "Product Name",               type: string  }
      - name: category
        label: Category
        type: select
        options:
          values:
            - { label: Books,            value: books  }
            - { label: "Question Banks", value: qbank  }
            - { label: "Study Kits",     value: kits   }
      - { name: description, label: "Short Description",          type: text    }
      - { name: price,       label: "Price in ₹",                type: number  }
      - { name: badge,       label: "Badge (e.g. Bestseller, New, Top Pick)", type: string }
      - name: badge_color
        label: Badge Colour
        type: select
        options:
          values:
            - { label: Gold,  value: gold  }
            - { label: Green, value: green }
            - { label: Teal,  value: teal  }
      - { name: buy_link,    label: "Buy / Enquire Link",         type: string  }
      - { name: image,       label: "Product Image",              type: image   }

  - name: team
    label: Faculty & Tutors
    path: content/team
    type: collection
    view:
      fields: [name, faculty_type, subjects]
    fields:
      - { name: name,           label: "Full Name",                         type: string }
      - name: faculty_type
        label: Faculty Type
        type: select
        options:
          values:
            - { label: "Core Faculty",     value: core     }
            - { label: "Visiting Faculty", value: visiting }
      - { name: qualifications, label: "Qualifications (e.g. B.Com, FCA)", type: string }
      - { name: subjects,       label: "Subjects Taught",                   type: string }
      - { name: specialty,      label: "Specialty (visiting only)",         type: string }
      - { name: experience,     label: "Experience (e.g. 10 years)",        type: string }
      - { name: bio,            label: "Short Bio",                         type: text   }
      - { name: photo,          label: "Photo",                             type: image  }

  - name: testimonials
    label: Student Testimonials
    path: content/testimonials
    type: collection
    view:
      fields: [name, course, achievement]
    fields:
      - { name: name,        label: "Student Name",     type: string  }
      - { name: course,      label: "Course / Batch",   type: string  }
      - { name: quote,       label: "Testimonial Text", type: text    }
      - { name: achievement, label: "Achievement",      type: string  }
      - { name: featured,    label: "Show on Homepage", type: boolean }
      - { name: photo,       label: "Student Photo",    type: image   }

  - name: news
    label: News & Events
    path: content/news
    type: collection
    view:
      fields: [title, date, category]
    fields:
      - { name: title,       label: "Title",                type: string }
      - { name: date,        label: "Date (e.g. May 2024)", type: string }
      - { name: description, label: "Description",          type: text   }
      - name: category
        label: Category
        type: select
        options:
          values:
            - { label: Event,       value: event       }
            - { label: Achievement, value: achievement }
            - { label: Launch,      value: launch      }
      - { name: image,       label: "Event Photo",          type: image  }

  - name: walloffame
    label: Wall of Fame
    path: content/walloffame
    type: collection
    view:
      fields: [name, program, score, year]
    fields:
      - { name: name,    label: "Student Name", type: string }
      - { name: program, label: "Program",       type: string }
      - { name: score,   label: "Score / Rank", type: string }
      - { name: year,    label: "Year",          type: number }
      - { name: photo,   label: "Student Photo", type: image  }
